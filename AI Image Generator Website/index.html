<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AI Image Generator Website</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="main-container">

<div class="container">

<div class="headings-container">
<h1>Hey Guys !! Watch Out This</h1>

<h2 class="heading">
AI Image generator website using JavaScript
</h2>

<h5 class="sub-heading">
Enter the text in the below input bar and <br>
get the AI generated image related to this text.
</h5>
</div>


<!-- FORM START -->
<form id="generate-image-form" class="form-container">

<input
id="input-value"
placeholder="Enter some text..."
type="text"
class="form-input form-controls"
required
>

<button
type="submit"
class="image-generate-btn form-controls">
Generate Image
</button>

</form>
<!-- FORM END -->


<div id="images-visible" class="image-container" style="display:none;">

<p id="imageContainerText"></p>

<img
id="generated-image"
class="my-generated-image"
src=""
alt="AI Generated Image"
width="400"
>

</div>

</div>
</div>

<script src="index.js"></script>

</body>
</html>
